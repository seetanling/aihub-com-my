<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0B0B0F"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#A78BFA" stroke-width="0.2" opacity="0.15"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0B0B0F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="#A78BFA" opacity="0.8"/>

  <!-- Left decorative bar -->
  <rect x="80" y="160" width="4" height="200" fill="#A78BFA" rx="2"/>

  <!-- Main heading: AIHub Malaysia -->
  <text x="112" y="255" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="82" font-weight="700" fill="#FFFFFF" letter-spacing="-2">AIHub</text>
  <text x="112" y="345" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="82" font-weight="700" fill="#A78BFA" letter-spacing="-2">Malaysia</text>

  <!-- Subtitle -->
  <text x="112" y="400" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#C4B5FD" letter-spacing="0.5">Malaysia's AI Community</text>

  <!-- Divider line -->
  <line x1="112" y1="430" x2="520" y2="430" stroke="#A78BFA" stroke-width="1" opacity="0.4"/>

  <!-- Pill tags -->
  <!-- Events pill -->
  <rect x="112" y="452" width="130" height="40" rx="20" fill="#A78BFA" opacity="0.15" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.4"/>
  <text x="177" y="477" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="500" fill="#A78BFA" text-anchor="middle">Events</text>

  <!-- Networking pill -->
  <rect x="256" y="452" width="158" height="40" rx="20" fill="#A78BFA" opacity="0.15" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.4"/>
  <text x="335" y="477" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="500" fill="#A78BFA" text-anchor="middle">Networking</text>

  <!-- Resources pill -->
  <rect x="428" y="452" width="148" height="40" rx="20" fill="#A78BFA" opacity="0.15" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.4"/>
  <text x="502" y="477" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="500" fill="#A78BFA" text-anchor="middle">Resources</text>

  <!-- Penang pill -->
  <rect x="590" y="452" width="116" height="40" rx="20" fill="#A78BFA" opacity="0.15" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.4"/>
  <text x="648" y="477" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="500" fill="#A78BFA" text-anchor="middle">Penang</text>

  <!-- Decorative node circles (right side) -->
  <circle cx="950" cy="200" r="80" fill="none" stroke="#A78BFA" stroke-width="1" opacity="0.2"/>
  <circle cx="950" cy="200" r="50" fill="none" stroke="#A78BFA" stroke-width="1" opacity="0.3"/>
  <circle cx="950" cy="200" r="20" fill="#A78BFA" opacity="0.25"/>
  <circle cx="1080" cy="350" r="50" fill="none" stroke="#A78BFA" stroke-width="0.8" opacity="0.15"/>
  <circle cx="820" cy="380" r="35" fill="none" stroke="#A78BFA" stroke-width="0.8" opacity="0.15"/>
  <!-- Connection lines -->
  <line x1="950" y1="200" x2="1080" y2="350" stroke="#A78BFA" stroke-width="0.8" opacity="0.15"/>
  <line x1="950" y1="200" x2="820" y2="380" stroke="#A78BFA" stroke-width="0.8" opacity="0.15"/>
  <line x1="820" y1="380" x2="1080" y2="350" stroke="#A78BFA" stroke-width="0.8" opacity="0.1"/>

  <!-- Bottom domain -->
  <text x="112" y="582" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="500" fill="#6B7280" letter-spacing="1">aihub.com.my</text>

  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="#A78BFA" opacity="0.4"/>
</svg>
